name: Keep Render API awake

on:
  schedule:
    # Every 10 minutes — beats Render free-tier 15-min sleep timer
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping fast health endpoint
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 45 "https://star-ranker.onrender.com/api/health")
            echo "attempt $i -> $code"
            [ "$code" = "200" ] && exit 0
            sleep 5
          done
          # Don't fail the workflow even if Render is fully down — the ping itself wakes it
          exit 0
